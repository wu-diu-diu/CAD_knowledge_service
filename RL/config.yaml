training:
  episodes: 25000
  gamma: 0.99
  gae_lambda: 0.95        # GAE lambda，平衡偏差与方差
  learning_rate: 0.0003
  ppo_epochs: 4
  rollout_episodes: 128    # 每次PPO更新前累积的episode数（batch≈128步）
  clip_eps: 0.2
  value_coef: 0.5
  entropy_coef: 0.05      # 多房间训练需要更强探索，防止过早收敛
  grad_clip_norm: 0.5
  seed: 42
  device: "cuda:1"
  visualize_every_episodes: 100
  log_every_episodes: 32  # 与rollout_episodes对齐，每批次输出一次日志
  reward_curve_moving_window: 50

environment:
  padded_size: 48  # 增大以容纳35x33的不规则房间
  max_steps: 16
  target_lamp_count: 5
  turn_penalty: 0.2
  wall_margin: 1  # 灯具距墙/门/开关的最小安全距离（格子数）

reward:
  potential_coef: 3.0         # 每步势能减少奖励
  alignment_coef: 3.0         # 终局行列对齐奖励（提高到2.0，强化对齐优先级）
  wiring_coef: 0.5            # 终局布线奖励（归一化wiring_score）
  grid_regularity_coef: 0.0   # 终局网格规则性奖励（禁用，避免与对齐竞争）
  alignment_tolerance: 0.001    # 软对齐容忍度：差1格得0.5分，差2格得0分
  invalid_action_penalty: 10.0
